model:
  # Primary model for all RQ1-RQ3 headline results. Kept consistent with the
  # fine-tune base (urchade/gliner_medium-v2.1) and the ablation medium row so
  # every figure in the thesis refers to the same architecture.
  # The former knowledgator/gliner-multitask-large-v0.5 showcase outputs are
  # archived under results/showcase_multitask_large/ for reference.
  name: "urchade/gliner_medium-v2.1"
  threshold: 0.5

labels:
  - gliner_label: "person"
    conll_label: "PER"
  - gliner_label: "organization"
    conll_label: "ORG"
  - gliner_label: "location"
    conll_label: "LOC"
  - gliner_label: "miscellaneous"
    conll_label: "MISC"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  results: "results"
  cleanconll_repo: "data/cleanconll_repo"

seed: 42
